name: text-to-sql
version: 1.0.0
description: Natural language to SQL query generation with execution-based grading
entry_point: sql_env:create_env

graders:
  - id: sql_execution_grader
    type: execution_based
    module: grader
    function: grade_result
    min_score: 0.0
    max_score: 1.0
    description: Grades SQL query results by comparing execution output

tasks:
  - id: easy
    difficulty: easy
    grader: sql_execution_grader
    question: Show all customers from California
    ground_truth_sql: SELECT id, name, email, city, state FROM customers WHERE state = 'CA'
  - id: medium
    difficulty: medium
    grader: sql_execution_grader
    question: What is the total number of orders per customer?
    ground_truth_sql: SELECT c.id, c.name, COUNT(o.id) as order_count FROM customers c LEFT JOIN orders o ON c.id = o.customer_id GROUP BY c.id, c.name ORDER BY order_count DESC
  - id: hard
    difficulty: hard
    grader: sql_execution_grader
    question: Find customers whose total spending exceeds the average
    ground_truth_sql: SELECT c.id, c.name, c.email, SUM(o.total_amount) as total_spent FROM customers c JOIN orders o ON c.id = o.customer_id GROUP BY c.id, c.name, c.email HAVING SUM(o.total_amount) > (SELECT AVG(total_spent) FROM (SELECT customer_id, SUM(total_amount) as total_spent FROM orders GROUP BY customer_id)) ORDER BY total_spent DESC

observation:
  type: object
  properties:
    question:
      type: string
      description: The natural language question to answer with SQL
    schema_info:
      type: string
      description: Database schema information for context
    feedback:
      type: string
      description: Execution result or error message from previous step
    error:
      type: string
      description: SQLite error message if query failed

action:
  type: object
  properties:
    sql_query:
      type: string
      description: SQL query to execute against the database

reward:
  type: float
  description: Reward score between 0.0 and 1.0